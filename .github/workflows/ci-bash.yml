# Delegates to the shared bash CI workflow in Common-Automation. It
# shellchecks production bash (.github/actions/), runner bash
# (scripts/), and git hooks; verifies the +x bit on every tracked
# *.sh; and runs every *.bats suite under the repo. Empty surfaces
# auto-skip with ::notice::. For this JavaScript repo the only bash
# surface today is the runner shims under scripts/
# (run-ci-yaml-and-bash.sh, run-lint-yaml-and-bash.sh,
# run-tests-bash.sh, fix-permissions.sh, publish-version-tags.sh) -
# the workflow shellchecks those so the shims stay held to the same
# strict bar as every other repo.
name: ci-bash

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  ci-bash:
    uses: Klark-Morrigan/Common-Automation/.github/workflows/ci-bash.yml@master
